<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fuin — Android DEX Packer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c63ff;
      --accent-dim: #4a42cc;
      --green: #3ecf8e;
      --red: #ff5c5c;
      --yellow: #f7c948;
      --blue: #4d9fff;
      --text: #e2e4f0;
      --muted: #6b7099;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 800px; margin: 0 auto; }

    header { margin-bottom: 40px; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); margin-top: 6px; }

    /* API Key */
    .api-key-row { display: flex; gap: 8px; margin-bottom: 32px; }
    .api-key-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .api-key-row input:focus { border-color: var(--accent); }
    .api-key-row button {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    .api-key-row button:hover { background: var(--border); }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .dropzone.hover { border-color: var(--accent); background: rgba(108,99,255,.06); }
    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone-icon { font-size: 40px; margin-bottom: 12px; }
    .dropzone p { color: var(--muted); line-height: 1.6; }
    .dropzone p strong { color: var(--text); }

    /* Options grid */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    .option-row { display: flex; flex-direction: column; gap: 4px; }
    .option-row label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    .option-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .option-row input:focus { border-color: var(--accent); }

    /* Pack button */
    .pack-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .pack-btn:hover:not(:disabled) { background: var(--accent-dim); }
    .pack-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Progress */
    #progress-section { margin-top: 28px; display: none; }
    .progress-label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .progress-label .step-name { font-size: 13px; color: var(--muted); }
    .progress-label .pct { font-size: 13px; font-weight: 600; }
    .progress-track {
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width .35s ease;
      width: 0%;
    }
    .progress-fill.error { background: var(--red); }

    /* Steps */
    .steps { margin-top: 20px; display: flex; flex-direction: column; gap: 6px; }
    .step-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      color: var(--muted);
      transition: color .2s, background .2s;
    }
    .step-item.active { color: var(--text); background: var(--surface2); }
    .step-item.done { color: var(--green); }
    .step-item.error { color: var(--red); }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* Result card */
    #result-section { margin-top: 28px; display: none; }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .result-card h3 { font-size: 15px; margin-bottom: 14px; color: var(--green); }
    .result-card h3.error-title { color: var(--red); }

    /* Info grid for analysis */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    @media (max-width: 500px) { .info-grid { grid-template-columns: 1fr; } }
    .info-cell {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .info-cell .ic-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .info-cell .ic-val { font-size: 13px; font-weight: 500; }

    .perms-section { margin-top: 12px; }
    .perms-section .perms-toggle {
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px;
      padding: 0; transition: color .15s;
    }
    .perms-section .perms-toggle:hover { color: var(--text); }
    .perms-list {
      margin-top: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
    }
    .perms-list.open { display: flex; }
    .perm-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: monospace;
    }
    .perm-tag.dangerous { border-color: var(--red); color: var(--red); }

    .meta-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .meta-row .key { color: var(--muted); min-width: 120px; font-size: 12px; }
    .meta-row .val { font-size: 12px; word-break: break-all; }
    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 16px;
      padding: 10px 20px;
      background: var(--green);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
    }
    .download-btn:hover { opacity: .85; }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 36px 0; }

    /* Apps list */
    #apps-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .apps-list { display: flex; flex-direction: column; gap: 10px; }
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
    }
    .app-card-header { display: flex; align-items: center; gap: 16px; }
    .app-card-info { flex: 1; min-width: 0; }
    .app-card-pkg { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .app-card-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; flex-wrap: wrap; }
    .app-card-sig { font-family: monospace; }
    .app-card-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .app-card-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .app-card-details.open { display: block; }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: background .15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-sm:hover { background: var(--border); }
    .btn-sm.danger { border-color: var(--red); color: var(--red); }
    .btn-sm.danger:hover { background: rgba(255,92,92,.12); }
    .btn-sm.mapping { border-color: var(--blue); color: var(--blue); }
    .btn-sm.mapping:hover { background: rgba(77,159,255,.12); }
    .empty-state { color: var(--muted); text-align: center; padding: 24px; }

    .refresh-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 12px; margin-left: 10px;
      transition: color .15s;
    }
    .refresh-btn:hover { color: var(--text); }

    /* Mapping upload */
    .mapping-upload { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .mapping-upload input[type=file] { font-size: 12px; color: var(--muted); flex: 1; min-width: 0; }
    .mapping-upload .btn-sm { flex-shrink: 0; }
    .mapping-status { font-size: 11px; color: var(--green); margin-top: 4px; display: none; }

    /* SDK badges */
    .sdk-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1><span>fuin</span> — Android DEX Packer</h1>
    <p>Upload an APK. Get a static-analysis-resistant APK back.</p>
  </header>

  <!-- API Key -->
  <div class="api-key-row">
    <input id="api-key" type="password" placeholder="X-API-Key" autocomplete="off" />
    <button onclick="saveKey()">Save</button>
  </div>

  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <input type="file" id="file-input" accept=".apk" />
    <div class="dropzone-icon">📦</div>
    <p><strong>Drop your APK here</strong><br/>or click to browse</p>
  </div>

  <!-- Options -->
  <div class="options-grid">
    <div class="option-row">
      <label>Application class (optional)</label>
      <input id="app-class" type="text" placeholder="com.example.MyApp (auto-detected)" />
    </div>
    <div class="option-row">
      <label>Webhook URL (optional)</label>
      <input id="webhook-url" type="url" placeholder="https://hooks.example.com/notify" />
    </div>
  </div>

  <button class="pack-btn" id="pack-btn" onclick="startPack()">Pack APK</button>

  <!-- Progress -->
  <div id="progress-section">
    <div class="progress-label">
      <span class="step-name" id="step-label">Preparing…</span>
      <span class="pct" id="pct-label">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="steps" id="steps-list"></div>
  </div>

  <!-- Result -->
  <div id="result-section">
    <div class="result-card" id="result-card"></div>
  </div>

  <hr class="divider" />

  <!-- Apps list -->
  <div id="apps-section">
    <h2>
      Packed Apps
      <button class="refresh-btn" onclick="loadApps()">↻ refresh</button>
    </h2>
    <div class="apps-list" id="apps-list"><div class="empty-state">Loading…</div></div>
  </div>

</div>

<script>
const STEPS = [
  { id: "loading_stub",       label: "Loading stub DEX" },
  { id: "patching_manifest",  label: "Patching AndroidManifest.xml" },
  { id: "encrypting_dex",     label: "Encrypting DEX files (AES-256-GCM)" },
  { id: "injecting",          label: "Injecting into APK" },
  { id: "aligning",           label: "Running zipalign" },
  { id: "signing",            label: "Signing APK (v1 + v2)" },
  { id: "saving",             label: "Saving packed APK" },
  { id: "done",               label: "Done" },
];

const DANGEROUS_PERMS = new Set([
  "android.permission.READ_CONTACTS","android.permission.WRITE_CONTACTS",
  "android.permission.ACCESS_FINE_LOCATION","android.permission.ACCESS_COARSE_LOCATION",
  "android.permission.READ_CALL_LOG","android.permission.WRITE_CALL_LOG",
  "android.permission.CAMERA","android.permission.RECORD_AUDIO",
  "android.permission.READ_PHONE_STATE","android.permission.CALL_PHONE",
  "android.permission.READ_SMS","android.permission.SEND_SMS",
  "android.permission.READ_EXTERNAL_STORAGE","android.permission.WRITE_EXTERNAL_STORAGE",
  "android.permission.GET_ACCOUNTS","android.permission.USE_BIOMETRIC",
  "android.permission.BODY_SENSORS","android.permission.ACTIVITY_RECOGNITION",
]);

let selectedFile = null;

// ── API key persistence ────────────────────────────────────────────────────
function getKey() { return localStorage.getItem("fuin_api_key") || ""; }
function saveKey() {
  const v = document.getElementById("api-key").value.trim();
  localStorage.setItem("fuin_api_key", v);
}
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("api-key").value = getKey();
  renderSteps(null);
  loadApps();
});

// ── Drop zone ──────────────────────────────────────────────────────────────
const dz = document.getElementById("dropzone");
const fi = document.getElementById("file-input");

dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("hover"); });
dz.addEventListener("dragleave", () => dz.classList.remove("hover"));
dz.addEventListener("drop", e => {
  e.preventDefault();
  dz.classList.remove("hover");
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fi.addEventListener("change", () => { if (fi.files[0]) setFile(fi.files[0]); });

function setFile(f) {
  if (!f.name.endsWith(".apk")) { alert("Please select an .apk file."); return; }
  selectedFile = f;
  dz.querySelector("p").innerHTML =
    `<strong>${escHtml(f.name)}</strong><br/>${(f.size / 1024 / 1024).toFixed(2)} MB`;
}

// ── Pack ───────────────────────────────────────────────────────────────────
async function startPack() {
  const key = getKey();
  if (!key) { alert("Set your API key first."); return; }
  if (!selectedFile) { alert("Select an APK first."); return; }

  const btn = document.getElementById("pack-btn");
  btn.disabled = true;
  btn.textContent = "Packing…";

  showProgress();
  hideResult();

  const fd = new FormData();
  fd.append("file", selectedFile);
  const appClass = document.getElementById("app-class").value.trim();
  if (appClass) fd.append("app_class", appClass);
  const webhookUrl = document.getElementById("webhook-url").value.trim();
  if (webhookUrl) fd.append("webhook_url", webhookUrl);

  let jobId;
  try {
    const res = await fetch("/pack", { method: "POST", headers: { "X-API-Key": key }, body: fd });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || res.statusText); }
    const data = await res.json();
    jobId = data.job_id;
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = "Pack APK";
    return;
  }

  const es = new EventSource(`/jobs/${jobId}/stream?api_key=${encodeURIComponent(key)}`);
  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    updateProgress(ev);
    if (ev.status === "done") {
      es.close();
      showResult(ev.result);
      btn.disabled = false;
      btn.textContent = "Pack APK";
      loadApps();
    } else if (ev.status === "error") {
      es.close();
      showError(ev.error);
      btn.disabled = false;
      btn.textContent = "Pack APK";
    }
  };
  es.onerror = () => {
    es.close();
    showError("Connection lost. Check server logs.");
    btn.disabled = false;
    btn.textContent = "Pack APK";
  };
}

// ── Progress UI ────────────────────────────────────────────────────────────
function showProgress() {
  document.getElementById("progress-section").style.display = "block";
  renderSteps(null);
  setProgress("preparing", 0, false);
}

function renderSteps(activeId) {
  const list = document.getElementById("steps-list");
  list.innerHTML = STEPS.map(s => {
    let cls = "";
    if (s.id === activeId) cls = "active";
    return `<div class="step-item ${cls}" id="step-${s.id}">
      <div class="step-dot"></div>${escHtml(s.label)}
    </div>`;
  }).join("");
}

function updateProgress(ev) {
  setProgress(ev.step, ev.pct, ev.status === "error");
  if (ev.status === "running" || ev.status === "done") {
    let found = false;
    for (const s of STEPS) {
      const el = document.getElementById(`step-${s.id}`);
      if (!el) continue;
      if (s.id === ev.step) { el.className = "step-item active"; found = true; }
      else if (!found) { el.className = "step-item done"; }
      else { el.className = "step-item"; }
    }
    if (ev.status === "done") {
      STEPS.forEach(s => {
        const el = document.getElementById(`step-${s.id}`);
        if (el) el.className = "step-item done";
      });
    }
  }
}

function setProgress(step, pct, isError) {
  const fill = document.getElementById("progress-fill");
  document.getElementById("step-label").textContent = stepLabel(step);
  document.getElementById("pct-label").textContent = `${pct}%`;
  fill.style.width = `${pct}%`;
  fill.classList.toggle("error", isError);
}

function stepLabel(id) {
  return STEPS.find(s => s.id === id)?.label || id;
}

// ── Result ─────────────────────────────────────────────────────────────────
function showResult(result) {
  const key = getKey();
  const a = result.analysis || {};
  const card = document.getElementById("result-card");

  const sdkBadge = (v, label) => v != null
    ? `<span class="sdk-badge">${escHtml(label)}: API ${v}</span>` : "";

  const dexInfo = a.dex_count > 1
    ? `${a.dex_count} DEX files (multidex)` : `${a.dex_count || 1} DEX file`;

  const permsHtml = renderPermsHtml(a.permissions || []);

  card.innerHTML = `
    <h3>✓ Packing complete</h3>
    <div class="info-grid">
      <div class="info-cell">
        <div class="ic-label">Package</div>
        <div class="ic-val">${escHtml(result.package_name)}</div>
      </div>
      <div class="info-cell">
        <div class="ic-label">Version</div>
        <div class="ic-val">${escHtml(a.version_name || '—')}</div>
      </div>
      <div class="info-cell">
        <div class="ic-label">SDK</div>
        <div class="ic-val" style="display:flex;gap:6px;flex-wrap:wrap">
          ${sdkBadge(a.min_sdk, 'min') || '<span style="color:var(--muted)">—</span>'}
          ${sdkBadge(a.target_sdk, 'target')}
        </div>
      </div>
      <div class="info-cell">
        <div class="ic-label">Components</div>
        <div class="ic-val" style="color:var(--muted);font-size:12px">
          ${a.activities || 0}A · ${a.services || 0}S · ${a.receivers || 0}R · ${a.providers || 0}P
        </div>
      </div>
      <div class="info-cell">
        <div class="ic-label">DEX</div>
        <div class="ic-val">${escHtml(dexInfo)}</div>
      </div>
      <div class="info-cell">
        <div class="ic-label">Size</div>
        <div class="ic-val">${(a.file_size_bytes / 1024 / 1024).toFixed(2)} MB</div>
      </div>
    </div>
    ${permsHtml}
    ${metaRow("SHA-256", result.apk_signature.substring(0, 32) + "…")}
    <button class="download-btn" onclick="downloadApp('${result.app_id}','${escHtml(result.package_name)}')">
      ⬇ Download packed APK
    </button>
  `;
  document.getElementById("result-section").style.display = "block";
}

function renderPermsHtml(perms) {
  if (!perms.length) return "";
  const dangerous = perms.filter(p => DANGEROUS_PERMS.has(p));
  const safe = perms.filter(p => !DANGEROUS_PERMS.has(p));
  const tags = [
    ...dangerous.map(p => `<span class="perm-tag dangerous">${escHtml(p.replace("android.permission.",""))}</span>`),
    ...safe.map(p => `<span class="perm-tag">${escHtml(p.replace("android.permission.",""))}</span>`),
  ].join("");
  const dangerNote = dangerous.length ? ` <span style="color:var(--red);font-size:11px">(${dangerous.length} dangerous)</span>` : "";
  return `
    <div class="perms-section">
      <button class="perms-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
        ▸ ${perms.length} permissions${dangerNote}
      </button>
      <div class="perms-list">${tags}</div>
    </div>`;
}

function showError(msg) {
  const card = document.getElementById("result-card");
  card.innerHTML = `<h3 class="error-title">✗ Pack failed</h3>
    <div class="meta-row"><span class="val" style="color:var(--red)">${escHtml(msg)}</span></div>`;
  document.getElementById("result-section").style.display = "block";

  const fill = document.getElementById("progress-fill");
  fill.classList.add("error");
  document.getElementById("step-label").textContent = "Error";
  STEPS.forEach(s => {
    const el = document.getElementById(`step-${s.id}`);
    if (el && el.classList.contains("active")) el.className = "step-item error";
  });
}

function hideResult() {
  document.getElementById("result-section").style.display = "none";
}

function metaRow(k, v) {
  return `<div class="meta-row"><span class="key">${escHtml(k)}</span><span class="val">${escHtml(String(v))}</span></div>`;
}

// ── Apps list ──────────────────────────────────────────────────────────────
async function loadApps() {
  const key = getKey();
  if (!key) return;
  try {
    const res = await fetch("/apps", { headers: { "X-API-Key": key } });
    if (!res.ok) return;
    const apps = await res.json();
    renderApps(apps);
  } catch {}
}

function renderApps(apps) {
  const list = document.getElementById("apps-list");
  if (!apps.length) {
    list.innerHTML = '<div class="empty-state">No packed apps yet.</div>';
    return;
  }
  list.innerHTML = apps.map(a => {
    const analysis = a.analysis || {};
    const sdkText = [
      analysis.min_sdk != null ? `min API ${analysis.min_sdk}` : null,
      analysis.target_sdk != null ? `target API ${analysis.target_sdk}` : null,
    ].filter(Boolean).join(" · ");
    const dexText = analysis.dex_count > 1 ? `${analysis.dex_count} DEX` : "";
    const date = a.created_at ? new Date(a.created_at).toLocaleDateString() : "";
    const mappingBtn = a.has_mapping
      ? `<button class="btn-sm mapping" onclick="downloadMapping('${a.app_id}','${escHtml(a.package_name)}')">📄 mapping</button>`
      : ``;

    return `
    <div class="app-card" id="app-${a.app_id}">
      <div class="app-card-header">
        <div class="app-card-info">
          <div class="app-card-pkg">${escHtml(a.package_name)}</div>
          <div class="app-card-meta">
            ${sdkText ? `<span>${escHtml(sdkText)}</span>` : ""}
            ${dexText ? `<span>${escHtml(dexText)}</span>` : ""}
            ${date ? `<span>${escHtml(date)}</span>` : ""}
            <span class="app-card-sig">${escHtml(a.apk_signature.substring(0,16))}…</span>
          </div>
        </div>
        <div class="app-card-actions">
          <button class="btn-sm" onclick="toggleDetails('${a.app_id}')">details</button>
          <button class="btn-sm" onclick="downloadApp('${a.app_id}','${escHtml(a.package_name)}')">⬇ Download</button>
          <button class="btn-sm danger" onclick="deleteApp('${a.app_id}')">Delete</button>
        </div>
      </div>
      <div class="app-card-details" id="details-${a.app_id}">
        ${renderAppDetails(a)}
        <div style="margin-top:10px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">ProGuard Mapping</div>
          ${mappingBtn}
          <div class="mapping-upload">
            <input type="file" id="mapping-file-${a.app_id}" accept=".txt,.map" />
            <button class="btn-sm" onclick="uploadMapping('${a.app_id}')">Upload mapping.txt</button>
          </div>
          <div class="mapping-status" id="mapping-status-${a.app_id}">Uploaded successfully</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderAppDetails(a) {
  const analysis = a.analysis || {};
  const permsHtml = renderPermsHtml(analysis.permissions || []);
  const sdkBadge = (v, label) => v != null
    ? `<span class="sdk-badge">${escHtml(label)}: API ${v}</span>` : "";
  return `
    <div class="info-grid" style="margin-bottom:10px">
      <div class="info-cell"><div class="ic-label">Version</div><div class="ic-val">${escHtml(analysis.version_name||'—')}</div></div>
      <div class="info-cell">
        <div class="ic-label">SDK</div>
        <div class="ic-val" style="display:flex;gap:6px;flex-wrap:wrap">
          ${sdkBadge(analysis.min_sdk,'min')||'<span style="color:var(--muted)">—</span>'}
          ${sdkBadge(analysis.target_sdk,'target')}
        </div>
      </div>
      <div class="info-cell">
        <div class="ic-label">Components</div>
        <div class="ic-val" style="color:var(--muted);font-size:12px">
          ${analysis.activities||0}A · ${analysis.services||0}S · ${analysis.receivers||0}R · ${analysis.providers||0}P
        </div>
      </div>
      <div class="info-cell">
        <div class="ic-label">DEX</div>
        <div class="ic-val">${escHtml((analysis.dex_files||['classes.dex']).join(', '))}</div>
      </div>
    </div>
    ${permsHtml}`;
}

function toggleDetails(appId) {
  document.getElementById(`details-${appId}`)?.classList.toggle("open");
}

// ── Mapping upload ─────────────────────────────────────────────────────────
async function uploadMapping(appId) {
  const key = getKey();
  const input = document.getElementById(`mapping-file-${appId}`);
  if (!input.files[0]) { alert("Select a mapping.txt first."); return; }
  const fd = new FormData();
  fd.append("file", input.files[0]);
  try {
    const res = await fetch(`/apps/${appId}/mapping/upload`, {
      method: "POST",
      headers: { "X-API-Key": key },
      body: fd,
    });
    if (!res.ok) { alert("Upload failed: " + (await res.json()).detail); return; }
    const status = document.getElementById(`mapping-status-${appId}`);
    if (status) { status.style.display = "block"; setTimeout(() => { status.style.display = "none"; }, 3000); }
  } catch (err) { alert("Error: " + err.message); }
}

async function downloadMapping(appId, pkg) {
  fetchDownload(`/apps/${appId}/mapping`, getKey(), `${pkg}_mapping.txt`);
}

// ── Download / delete ──────────────────────────────────────────────────────
function downloadApp(appId, pkg) {
  fetchDownload(`/apps/${appId}/download`, getKey(), `${pkg}_packed.apk`);
}

async function fetchDownload(url, key, filename) {
  try {
    const res = await fetch(url, { headers: { "X-API-Key": key } });
    if (!res.ok) { alert("Download failed: " + res.statusText); return; }
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (err) { alert("Download error: " + err.message); }
}

async function deleteApp(appId) {
  if (!confirm("Delete this packed APK?")) return;
  const key = getKey();
  try {
    const res = await fetch(`/apps/${appId}`, { method: "DELETE", headers: { "X-API-Key": key } });
    if (!res.ok) { alert("Delete failed"); return; }
    document.getElementById(`app-${appId}`)?.remove();
    const list = document.getElementById("apps-list");
    if (!list.children.length) list.innerHTML = '<div class="empty-state">No packed apps yet.</div>';
  } catch (err) { alert("Error: " + err.message); }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
