name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --frozen --only-dev

      - name: ruff check
        run: uv run ruff check fuin/

      - name: ruff format
        run: uv run ruff format --check fuin/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short
        env:
          FUIN_API_KEY: ci-test-key

      - name: CLI smoke
        run: |
          uv run python -c "from pathlib import Path; from tests.conftest import make_minimal_apk; Path('smoke.apk').write_bytes(make_minimal_apk())"
          uv run fuin-pack analyze smoke.apk --json

  gradle-plugin:
    name: Gradle plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Gradle plugin
        run: ./stub/gradlew -p gradle-plugin build --no-daemon

  stub:
    name: Android stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build stub AAR
        run: cd stub && ./gradlew :app:assembleRelease --no-daemon

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
